# Beispiel für eine Lovelace-View mit der Klima-Sparbuch-Karte.
# In deinem Dashboard (Raw-Konfigurationseditor) einfügen oder als
# Ausgangspunkt für die UI-Kartenkonfiguration ("YAML bearbeiten") nutzen.

title: Klima-Sparbuch
views:
  - title: Mobilität
    path: mobilitaet
    cards:
      - type: custom:mobility-tracker-card
        title: Klima-Sparbuch
        total_km_entity: input_number.mobility_total_km
        co2_entity: sensor.mobility_co2_saved
        trees_entity: sensor.mobility_trees_saved
        money_entity: input_number.mobility_total_money_saved
        # Kraftstoffpreis: die Karte liest hier bewusst NUR den taeglich per
        # Automation aktualisierten Helfer, kein Live-Sensor. Muss also
        # nicht angepasst werden, solange du den Standardnamen nutzt.
        fuel_price_entity: input_number.mobility_fuel_price
        # km ist jeweils der EINFACHE Weg (nur eine Richtung). Beim Buchen
        # per Klick verdoppelt die Karte den Wert automatisch (Hin+Rück).
        # Beliebig viele Presets möglich - einfach weitere Einträge ergänzen.
        routes:
          - name: Weg zur Kita
            km: 1.2
          - name: Weg zum Einkauf
            km: 2.0
          - name: Weg zur Arbeit
            km: 4.5
